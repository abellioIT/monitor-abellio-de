<!DOCTYPE html>
<html class="no-js" lang="">
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
		<title>Abellio Kundencenter</title>
		<meta name="description" content="">

		<link rel="stylesheet" href="css/normalize.min.css">
		<link rel="stylesheet" href="css/main.css">

	</head>
	<body>
		<div class="preloader">
			<div class="spinner">
				<div class="bounce1"></div>
				<div class="bounce2"></div>
				<div class="bounce3"></div>
			</div>
			<div class="preloader-text">Daten werden aktualisiert</div>
		</div>

		<div class="site-container">
			<header class="site-header">
				<img src="/img/logo-abellio.svg" alt="abellio" class="branding">
				<div class="tilted-bar-container">
					<div class="tilted-bar clearfix">
						<h1 class="page-title">Verkehrsmeldungen</h1>
						<div class="date-block-container clearfix">
							<div class="date-block date-block-date"><i class="icon-kalender"></i><span class="date" id="header-date">Donnerstag, 03.12.2015</span></div>
							<div class="date-block date-block-time"><i class="icon-uhr"></i><span class="time" id="header-time">17:33</span> Uhr</div>
						</div>
					</div>
				</div>
			</header>
			<div class="content-container clearfix">
				<div class="sidebar">
					<ul class="menu" id="menu">
						<!-- <li><a href="#section-1">Interessantes</a></li> -->
					</ul>
					<div id="timer-circle">
						<strong class="timer-seconds-value"></strong>
						<div class="timer-seconds-text">Sek.</div>
					</div>
				</div>
				<div class="main-content" id="main-content"></div>
			</div>
		</div>

		<script src="js/vendor/jquery-1.11.2.min.js"></script>
		<script src="js/plugins.min.js"></script>
		<script src="js/main.min.js?v=1.0.4"></script>
	</body>
</html>
